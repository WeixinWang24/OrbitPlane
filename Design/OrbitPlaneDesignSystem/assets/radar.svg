<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" fill="none">
  <defs>
    
    <radialGradient id="rd-space" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0B1726"></stop>
      <stop offset="55%" stop-color="#040810"></stop>
      <stop offset="100%" stop-color="#02030A"></stop>
    </radialGradient>

    
    <radialGradient id="rd-nebula" cx="20%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#7AF6FF" stop-opacity="0.16"></stop>
      <stop offset="40%" stop-color="#3478C8" stop-opacity="0.07"></stop>
      <stop offset="100%" stop-color="#02030A" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="rd-pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.18"></stop>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"></stop>
    </radialGradient>

    
    <linearGradient id="rd-sweep" gradientUnits="userSpaceOnUse" x1="180" y1="180" x2="320" y2="180">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"></stop>
      <stop offset="80%" stop-color="#7AF6FF" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#7AF6FF" stop-opacity="0.55"></stop>
    </linearGradient>

    <filter id="rd-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="rd-bigglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect width="360" height="360" fill="url(#rd-space)"></rect>
  <rect width="360" height="360" fill="url(#rd-nebula)"></rect>

  
