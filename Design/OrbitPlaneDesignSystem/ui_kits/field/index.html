<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>OrbitPlane · Field</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: #05060A; }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(255,255,255,0.012) 2px 3px);
  }
  .stage {
    min-height: 100vh; min-width: 1340px;
    background:
      radial-gradient(ellipse 800px 600px at 50% 30%, rgba(0,229,255,0.06), transparent),
      #05060A;
    display: flex; flex-direction: column; align-items: center; padding: 40px 24px 60px;
    gap: 28px;
  }
  .label { font-family: var(--op-font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--op-fg-3); }
  .row { display: flex; gap: 40px; align-items: flex-start; justify-content: center; }
  .stack { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .heading { font-family: var(--op-font-display); font-size: 26px; font-weight: 600; color: var(--op-fg-1); letter-spacing: -0.02em; }
  .sub { font-family: var(--op-font-display); font-size: 13px; color: var(--op-fg-2); max-width: 720px; text-align: center; }
</style>
</head>
<body class="op-body" data-screen-label="Field — mobile">

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
/* global React, ReactDOM, IOSDevice, IOSStatusBar, FleetHome, FieldAgentDetail, FieldIntervene */
const { useEffect } = React;

function App() {
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
  });

  return (
    <div className="stage">
      <div style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center' }}>
        <span className="label">field // pager-style mobile</span>
        <h1 className="heading">On-call mission control<span style={{ color: 'var(--op-cyan)' }}>.</span></h1>
        <p className="sub">Three core screens — fleet glance, agent triage, and intervene — for operators pager-paged in the field.</p>
      </div>

      <div className="row">
        <div className="stack">
          <IOSDevice dark>
            <FleetHome />
          </IOSDevice>
          <span className="label">01 // fleet</span>
        </div>
        <div className="stack">
          <IOSDevice dark>
            <FieldAgentDetail />
          </IOSDevice>
          <span className="label">02 // agent triage</span>
        </div>
        <div className="stack">
          <IOSDevice dark>
            <FieldIntervene />
          </IOSDevice>
          <span className="label">03 // intervene</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
