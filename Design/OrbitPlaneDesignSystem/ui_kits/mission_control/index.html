<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>OrbitPlane · Mission Control</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="op-body" data-screen-label="Mission Control">

<div id="root"></div>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="AgentDeck.jsx"></script>
<script type="text/babel" src="AgentDetail.jsx"></script>
<script type="text/babel">
/* global React, ReactDOM, TopBar, Sidebar, BottomBar, AgentGrid, ActivityFeed, AgentDetail, SEED_AGENTS, SEED_FEED */
const { useState, useEffect } = React;

function App() {
  const [focusId, setFocusId] = useState(null);

  const counts = SEED_AGENTS.reduce((acc, a) => {
    acc[a.status] = (acc[a.status] || 0) + 1;
    return acc;
  }, { running: 0, queued: 0, errored: 0 });

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
  });

  const focused = SEED_AGENTS.find(a => a.id === focusId);

  return (
    <div className="mc-app">
      <TopBar />
      <Sidebar />
      <main className="mc-main">
        {focused ? (
          <AgentDetail agent={focused} onClose={() => setFocusId(null)} />
        ) : (
          <AgentGrid agents={SEED_AGENTS} focusId={focusId} onPick={setFocusId} />
        )}
        {!focused && <ActivityFeed feed={SEED_FEED} />}
      </main>
      <BottomBar counts={counts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
