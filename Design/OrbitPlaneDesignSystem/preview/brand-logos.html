<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);}
  .wrap{padding:14px 18px;display:grid;grid-template-columns:1.6fr 1fr;gap:12px;}
  .panel{border:1px solid var(--op-line);padding:14px 16px;background:var(--op-elev-1);}
  .lbl{font-family:var(--op-font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);margin-bottom:10px;display:block;}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;align-items:center;}
  img{display:block;}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="panel">
    <span class="lbl">wordmark · horizontal</span>
    <img src="../assets/logo.svg" alt="OrbitPlane" width="280" />
  </div>
  <div class="panel">
    <span class="lbl">mark · square</span>
    <div class="row" style="justify-content:space-around;">
      <img src="../assets/logo-mark.svg" width="56" height="56" />
      <img src="../assets/logo-mark.svg" width="32" height="32" />
      <img src="../assets/logo-mark.svg" width="20" height="20" />
    </div>
  </div>
</div>
</body></html>
