<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);font-family:var(--op-font-display);}
  table{width:100%;border-collapse:collapse;}
  td{padding:6px 12px;border-top:1px solid var(--op-line);vertical-align:baseline;}
  td.lbl{font-family:var(--op-font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);width:90px;}
  td.px{font-family:var(--op-font-mono);font-size:10px;color:var(--op-fg-3);width:50px;text-align:right;}
  .wrap{padding:14px 24px;}
</style></head>
<body class="op-body">
<div class="wrap">
<table>
  <tr><td class="lbl">6xl / hero</td><td style="font-size:48px;font-weight:600;letter-spacing:-0.02em;line-height:1;">Aa</td><td class="px">88 / 64</td></tr>
  <tr><td class="lbl">3xl / h3</td><td style="font-size:32px;font-weight:600;letter-spacing:-0.02em;">Mission Control</td><td class="px">32</td></tr>
  <tr><td class="lbl">xl / h5</td><td style="font-size:20px;font-weight:500;">Run trace</td><td class="px">20</td></tr>
  <tr><td class="lbl">md / body</td><td style="font-size:15px;color:var(--op-fg-2);">3 agents halted. Reason: operator interrupt.</td><td class="px">15</td></tr>
  <tr><td class="lbl">xs / label</td><td style="font-family:var(--op-font-mono);font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);">agents // 14 active</td><td class="px">12</td></tr>
</table>
</div>
</body></html>
