<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);font-family:var(--op-font-mono);}
  .wrap{padding:18px 22px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .tag{padding:3px 8px;border:1px solid var(--op-line-2);font-size:11px;letter-spacing:0.08em;color:var(--op-fg-2);}
  .tag.cyan{border-color:rgba(0,229,255,0.3);color:var(--op-cyan);}
  .tag.lime{border-color:rgba(184,255,60,0.3);color:var(--op-lime);}
  .tag.magenta{border-color:rgba(255,46,142,0.3);color:var(--op-magenta);}
  .kbd{font-size:11px;color:var(--op-fg-2);padding:2px 7px;border:1px solid var(--op-line-2);border-bottom-width:2px;background:var(--op-elev-1);border-radius:2px;}
  .lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);width:70px;}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="row"><span class="lbl">tags</span>
    <span class="tag">[ run_42 ]</span>
    <span class="tag cyan">[ orbit/main ]</span>
    <span class="tag lime">[ +12 −4 ]</span>
    <span class="tag magenta">[ killed ]</span>
    <span class="tag">v1.4.0</span>
    <span class="tag">tool.web.fetch</span>
  </div>
  <div class="row"><span class="lbl">keys</span>
    <span style="font-size:11px;color:var(--op-fg-3);">intervene</span>
    <span class="kbd">⌘</span><span class="kbd">I</span>
    <span style="margin-left:14px;font-size:11px;color:var(--op-fg-3);">halt</span>
    <span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">K</span>
    <span style="margin-left:14px;font-size:11px;color:var(--op-fg-3);">search</span>
    <span class="kbd">⌘</span><span class="kbd">K</span>
  </div>
</div>
</body></html>
