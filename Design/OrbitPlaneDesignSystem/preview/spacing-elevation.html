<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{padding:14px 14px 18px;display:flex;flex-direction:column;justify-content:space-between;height:100px;}
  .name{font-family:var(--op-font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-2);}
  .meta{font-family:var(--op-font-mono);font-size:10px;color:var(--op-fg-3);}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="card" style="background:var(--op-elev-1);border:1px solid var(--op-line);">
    <span class="name">elev-1</span><span class="meta">flat panel · default</span>
  </div>
  <div class="card" style="background:var(--op-elev-2);border:1px solid var(--op-line);">
    <span class="name">elev-2</span><span class="meta">card · resting</span>
  </div>
  <div class="card" style="background:var(--op-elev-3);border:1px solid var(--op-line-2);">
    <span class="name">elev-3</span><span class="meta">card · hover</span>
  </div>
  <div class="card" style="background:var(--op-elev-2);border:1px solid rgba(0,229,255,0.4);box-shadow:0 0 24px -4px rgba(0,229,255,0.55);">
    <span class="name" style="color:var(--op-cyan);">glow / cyan</span><span class="meta">focused / live</span>
  </div>
</div>
</body></html>
