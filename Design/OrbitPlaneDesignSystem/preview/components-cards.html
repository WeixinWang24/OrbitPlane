<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);font-family:var(--op-font-mono);}
  .wrap{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .card{background:var(--op-elev-2);border:1px solid var(--op-line);padding:12px 14px;display:flex;flex-direction:column;gap:8px;position:relative;}
  .card.focused{border-color:rgba(0,229,255,0.4);box-shadow:0 0 24px -8px var(--op-cyan-glow);}
  .corners::before,.corners::after,.card.corners > .br::before,.card.corners > .br::after{content:"";position:absolute;width:10px;height:10px;border:1px solid var(--op-cyan);}
  .corners::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .corners::after{top:-1px;right:-1px;border-left:none;border-bottom:none;}
  .card.corners > .br{position:absolute;inset:auto 0 0 0;height:0;}
  .card.corners > .br::before{bottom:-1px;left:-1px;border-right:none;border-top:none;}
  .card.corners > .br::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
  .top{display:flex;justify-content:space-between;align-items:center;}
  .id{font-size:13px;color:var(--op-fg-1);letter-spacing:0.02em;}
  .ts{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--op-fg-3);}
  .body{font-family:var(--op-font-display);font-size:14px;color:var(--op-fg-2);line-height:1.4;}
  .meta{display:flex;gap:14px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--op-fg-3);}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="card">
    <div class="top"><span class="id">agt_8x4z</span><span class="ts">14:02:11Z</span></div>
    <div class="body">Synthesizing weekly digest from 1,402 inputs.</div>
    <div class="meta"><span><span class="dot" style="background:#B8FF3C;box-shadow:0 0 6px #B8FF3C;"></span>running</span><span>step 14/20</span><span>v1.4</span></div>
  </div>
  <div class="card corners focused">
    <span class="br"></span>
    <div class="top"><span class="id" style="color:var(--op-cyan);">agt_kk31</span><span class="ts">14:01:48Z</span></div>
    <div class="body">Awaiting operator confirmation to deploy patch.</div>
    <div class="meta"><span><span class="dot" style="background:#00E5FF;"></span>paused · intervene</span><span>v2.0</span></div>
  </div>
</div>
</body></html>
