<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);}
  .wrap{padding:18px 22px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{height:96px;border:1px solid var(--op-line);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw .name{font-family:var(--op-font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-2);}
  .sw .hex{font-family:var(--op-font-mono);font-size:10px;color:var(--op-fg-3);margin-top:2px;}
</style></head>
<body class="op-body">
<div class="wrap">
<div class="row">
  <div class="sw" style="background:#05060A;"><span class="name">void</span><span class="hex">#05060A</span></div>
  <div class="sw" style="background:#0A0D14;"><span class="name">base</span><span class="hex">#0A0D14</span></div>
  <div class="sw" style="background:#11141C;"><span class="name">elev-1</span><span class="hex">#11141C</span></div>
  <div class="sw" style="background:#161A24;"><span class="name">elev-2</span><span class="hex">#161A24</span></div>
  <div class="sw" style="background:#1C2230;"><span class="name">elev-3</span><span class="hex">#1C2230</span></div>
</div>
</div>
</body></html>
