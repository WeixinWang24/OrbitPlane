<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);}
  .wrap{padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .tile{position:relative;border:1px solid var(--op-line);height:170px;overflow:hidden;}
  .tile img{display:block;width:100%;height:100%;object-fit:cover;}
  .cap{position:absolute;left:8px;bottom:8px;font-family:var(--op-font-mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-2);background:rgba(5,6,10,0.7);padding:2px 6px;}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="tile"><img src="../assets/orbit-map.svg" /><span class="cap">orbit-map</span></div>
  <div class="tile"><img src="../assets/radar.svg" /><span class="cap">radar</span></div>
  <div class="tile"><img src="../assets/horizon.svg" style="object-fit:cover;object-position:center;" /><span class="cap">horizon</span></div>
</div>
</body></html>
