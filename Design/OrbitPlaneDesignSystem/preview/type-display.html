<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);font-family:var(--op-font-display);}
  .wrap{padding:24px 28px;display:flex;align-items:baseline;gap:32px;}
  .stack{display:flex;flex-direction:column;gap:8px;}
  .demo{line-height:1;letter-spacing:-0.02em;font-weight:600;}
  .lbl{font-family:var(--op-font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);}
  .row{display:flex;align-items:baseline;gap:14px;}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="stack" style="flex:1;">
    <span class="lbl">display // space grotesk</span>
    <span class="demo" style="font-size:64px;">Mission control,<span style="color:var(--op-cyan);">·</span></span>
    <span class="demo" style="font-size:64px;color:var(--op-fg-2);">for AI agents.</span>
  </div>
  <div class="stack" style="width:200px;">
    <div class="row"><span class="lbl" style="width:36px;">400</span><span style="font-family:var(--op-font-display);font-size:18px;font-weight:400;">Regular</span></div>
    <div class="row"><span class="lbl" style="width:36px;">500</span><span style="font-family:var(--op-font-display);font-size:18px;font-weight:500;">Medium</span></div>
    <div class="row"><span class="lbl" style="width:36px;">600</span><span style="font-family:var(--op-font-display);font-size:18px;font-weight:600;">SemiBold</span></div>
    <div class="row"><span class="lbl" style="width:36px;">700</span><span style="font-family:var(--op-font-display);font-size:18px;font-weight:700;">Bold</span></div>
  </div>
</div>
</body></html>
