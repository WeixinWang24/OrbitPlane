<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--op-base);color:var(--op-fg-1);font-family:var(--op-font-mono);}
  .wrap{padding:22px 28px;display:flex;align-items:stretch;gap:32px;}
  .stack{display:flex;flex-direction:column;gap:6px;flex:1;}
  .row{display:flex;align-items:baseline;gap:14px;}
  .lbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--op-fg-3);}
  .big{font-size:34px;font-weight:500;letter-spacing:0.02em;}
  .pad{padding:10px 12px;border:1px solid var(--op-line);background:var(--op-elev-1);}
  .caret::after{content:"▌";color:var(--op-cyan);animation:b 1s steps(2) infinite;margin-left:1px;}
  @keyframes b{50%{opacity:0;}}
</style></head>
<body class="op-body">
<div class="wrap">
  <div class="stack">
    <span class="lbl">mono // jetbrains mono</span>
    <span class="big">agt_8x4z · v1.4</span>
    <span class="big" style="color:var(--op-cyan);">$ orbit deploy<span class="caret"></span></span>
  </div>
  <div class="stack" style="max-width:240px;">
    <div class="pad"><span class="lbl">tag</span><div style="font-size:13px;color:var(--op-fg-1);">[ run_42 · errored ]</div></div>
    <div class="pad"><span class="lbl">italic</span><div style="font-size:13px;font-style:italic;color:var(--op-fg-2);">// agent thinking</div></div>
    <div class="pad"><span class="lbl">bold</span><div style="font-size:13px;font-weight:700;color:var(--op-lime);">200 OK</div></div>
  </div>
</div>
</body></html>
